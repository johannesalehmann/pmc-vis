name: pmc-vis
services:
  node:
    build: frontend/
    ports:
      - "3000:3000"
  editor:
    build: editor/
    ports:
      - "3002:3002"
    extra_hosts:
      - host.docker.internal:host-gateway

  server:
    build:
      context: backend
      dockerfile: server/Dockerfile
    ports:
      - "8080:8080"
      - "8082:8082"
    extra_hosts:
      - host.docker.internal:host-gateway
    profiles:
      - ''

  server-tools:
    build:
      context: backend
      dockerfile: server/Tools.Dockerfile
    ports:
      - "8080:8080"
      - "8082:8082"
    extra_hosts:
      - host.docker.internal:host-gateway
    volumes:
      - ./backend/gurobi:/data
    profiles:
      - 'tools'