<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8" name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Overview</title>  

  <link rel="stylesheet" href="../src/lib/style/colors.css">
  <link rel="stylesheet" href="../src/lib/style/cy-custom-extensions/ctx-menu.css">
  <link rel="stylesheet" href="../src/lib/style/main.css">
  <link rel="stylesheet" href="../src/lib/style/widgets/ctx-menu.css">
  <link rel="stylesheet" href="../src/lib/style/views/panes.css">
  <link rel="stylesheet" href="../src/lib/style/views/parallel-coords.css">
  <link rel="stylesheet" href="../src/lib/style/views/overview.css">
</head>

<body class="overview-page">
  <header class="overview-header">
    <h1 class="overview-title">Overview Graph</h3>
  </header>
  <main class="overview-main">    
    <div id="biofabric-layout-container" style="display: none;">
        <div id="biofabric-graph-panel" class="biofabric-graph-panel">
          <div id="biofabric-graph-markers" class="biofabric-graph-markers"></div>
        </div>
        <div id="biofabric-edge-boxes-panel" class="biofabric-edge-boxes-panel"></div>
    </div>
  </main>

  
  <a id="overview-config-toggle" class="overview-config-toggle" title="Toggle Sidebar">
    <i class="icon fa-solid fa-chevron-right" aria-hidden="true"></i>
  </a>
  
  <aside id="config" class="config">
      <h3 class="label label-info" id="overview-config-span">Selection Options</h3>
      <div id="overview-graph-config">
        <!-- layout specific options are appended here-->
      </div>
  </aside>
  
  <script src="../src/lib/views/overview/index.js" type="module"></script>

</body>

</html>
